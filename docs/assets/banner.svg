<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="16" ry="16" fill="url(#bg-gradient)"/>

  <!-- Subtle center glow -->
  <ellipse cx="450" cy="100" rx="300" ry="80" fill="url(#node-glow)"/>

  <!-- Grid lines (circuit board feel) -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Network nodes (scattered agents) -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="50" cy="30" r="3"/><circle cx="120" cy="55" r="2"/><circle cx="80" cy="80" r="2.5"/>
    <circle cx="200" cy="25" r="2"/><circle cx="250" cy="70" r="3"/><circle cx="310" cy="40" r="2"/>
    <circle cx="370" cy="85" r="2.5"/><circle cx="440" cy="30" r="2"/><circle cx="500" cy="60" r="3"/>
    <circle cx="560" cy="35" r="2"/><circle cx="620" cy="75" r="2.5"/><circle cx="680" cy="45" r="2"/>
    <circle cx="740" cy="80" r="3"/><circle cx="800" cy="30" r="2"/><circle cx="850" cy="65" r="2.5"/>
    <circle cx="70" cy="140" r="2"/><circle cx="140" cy="170" r="3"/><circle cx="210" cy="150" r="2.5"/>
    <circle cx="280" cy="175" r="2"/><circle cx="350" cy="145" r="3"/><circle cx="420" cy="170" r="2"/>
    <circle cx="560" cy="180" r="2"/><circle cx="700" cy="175" r="2.5"/><circle cx="840" cy="170" r="3"/>
  </g>

  <!-- Left agent cluster -->
  <g>
    <line x1="80" y1="75" x2="130" y2="55" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
    <line x1="80" y1="75" x2="115" y2="100" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
    <line x1="130" y1="55" x2="170" y2="72" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="115" y1="100" x2="170" y2="72" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="170" y1="72" x2="210" y2="60" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
    <circle cx="80" cy="75" r="4.5" fill="#818cf8" opacity="0.7"/>
    <circle cx="130" cy="55" r="3.5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="115" cy="100" r="3.5" fill="#a78bfa" opacity="0.6"/>
    <circle cx="170" cy="72" r="3" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="210" cy="60" r="2.5" fill="#ddd6fe" opacity="0.5"/>
  </g>

  <!-- Right agent cluster -->
  <g>
    <line x1="700" y1="80" x2="740" y2="60" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
    <line x1="700" y1="80" x2="730" y2="108" stroke="#6366f1" stroke-width="1.2" opacity="0.4"/>
    <line x1="740" y1="60" x2="780" y2="78" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="730" y1="108" x2="780" y2="78" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <line x1="780" y1="78" x2="820" y2="65" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
    <line x1="780" y1="78" x2="810" y2="100" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
    <circle cx="700" cy="80" r="4.5" fill="#818cf8" opacity="0.7"/>
    <circle cx="740" cy="60" r="3.5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="730" cy="108" r="3" fill="#a78bfa" opacity="0.6"/>
    <circle cx="780" cy="78" r="3" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="820" cy="65" r="2.5" fill="#ddd6fe" opacity="0.5"/>
    <circle cx="810" cy="100" r="2" fill="#ddd6fe" opacity="0.4"/>
  </g>

  <!-- Center orchestration hub (connecting left and right) -->
  <g opacity="0.25">
    <line x1="210" y1="60" x2="330" y2="85" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4 3"/>
    <line x1="570" y1="85" x2="700" y2="80" stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4 3"/>
  </g>

  <!-- Center hub ring -->
  <circle cx="450" cy="88" r="42" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.12"/>
  <circle cx="450" cy="88" r="56" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.07"/>

  <!-- Accent line below subtitle -->
  <rect x="350" y="148" width="200" height="1" rx="0.5" fill="url(#glow)"/>

  <!-- "CAP" text -->
  <text x="450" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="8">CAP</text>

  <!-- "Claude Agent Platform" subtitle -->
  <text x="450" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a0aec0" text-anchor="middle" letter-spacing="2">Claude Agent Platform</text>

  <!-- Corner accents -->
  <path d="M16 16 L16 35" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M16 16 L35 16" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M884 16 L884 35" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M884 16 L865 16" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M16 184 L16 165" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M16 184 L35 184" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M884 184 L884 165" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M884 184 L865 184" stroke="#6366f1" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
