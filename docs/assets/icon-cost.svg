<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bar chart bars -->
  <rect x="10" y="38" width="10" height="18" rx="2" fill="#22c55e"/>
  <rect x="27" y="26" width="10" height="30" rx="2" fill="#a3e635"/>
  <rect x="44" y="14" width="10" height="42" rx="2" fill="#eab308"/>
  <!-- Budget line -->
  <line x1="6" y1="20" x2="58" y2="20" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Dollar sign -->
  <text x="56" y="14" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#ef4444" text-anchor="middle">$</text>
  <!-- Baseline -->
  <line x1="6" y1="56" x2="58" y2="56" stroke="#475569" stroke-width="1.5"/>
</svg>
