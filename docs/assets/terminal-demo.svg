  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>

  <!-- Title text -->
  <text x="340" y="24" font-family="SF Mono, Menlo, Courier New, monospace" font-size="13" fill="#cdd6f4" text-anchor="middle">Terminal — cap</text>

  <!-- Terminal content -->
  <!-- Line 1: $ uv tool install cap -->
  <text x="20" y="72" font-family="SF Mono, Menlo, Courier New, monospace" font-size="14">
    <tspan fill="#cdd6f4">$ </tspan><tspan fill="#a6e3a1">uv tool install cap</tspan>
  </text>

  <!-- Line 2: Installed cap v0.4.0 -->
  <text x="20" y="94" font-family="SF Mono, Menlo, Courier New, monospace" font-size="14" fill="#6c7086">Installed cap v0.4.0</text>

  <!-- Line 3: empty -->

  <!-- Line 4: $ cap init -->
  <text x="20" y="138" font-family="SF Mono, Menlo, Courier New, monospace" font-size="14">
    <tspan fill="#cdd6f4">$ </tspan><tspan fill="#a6e3a1">cap init</tspan>
  </text>

  <!-- Line 5: checkmark AWS SSO -->
  <text x="20" y="160" font-family="SF Mono, Menlo, Courier New, monospace" font-size="14">
    <tspan fill="#a6e3a1">&#x2713; </tspan><tspan fill="#cdd6f4">AWS SSO session valid</tspan>
  </text>

  <!-- Line 6: checkmark Config written -->
